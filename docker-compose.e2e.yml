version: '3.8'

services:
  postgres-e2e:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: madsuite_e2e
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d madsuite_e2e"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - postgres-e2e-data:/var/lib/postgresql/data
    networks:
      - e2e-network

volumes:
  postgres-e2e-data:

networks:
  e2e-network:
    driver: bridge
