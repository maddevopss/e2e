name: E2E CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  public-responsive:
    name: Public responsive checks
    runs-on: ubuntu-latest

    env:
      TEST_BASE_URL: ${{ vars.E2E_BASE_URL || secrets.E2E_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Require E2E base URL
        run: |
          if [ -z "$TEST_BASE_URL" ]; then
            echo "E2E_BASE_URL repository variable or secret is required."
            echo "Example: https://madsuite.ca"
            exit 1
          fi

      - name: Run public responsive suite
        run: npm run test:public -- --project=chromium-desktop

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-public
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  authenticated-responsive:
    name: Authenticated responsive checks
    runs-on: ubuntu-latest
    needs: public-responsive
    if: ${{ (vars.E2E_BASE_URL || secrets.E2E_BASE_URL) && secrets.E2E_ADMIN_EMAIL && secrets.E2E_PASSWORD }}

    env:
      TEST_BASE_URL: ${{ vars.E2E_BASE_URL || secrets.E2E_BASE_URL }}
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      E2E_AUTH_FILE: storageState/auth.json
      E2E_AUTH_REQUIRED: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Prepare authenticated browser session
        run: npm run test:auth -- --project=chromium-desktop

      - name: Run authenticated responsive suite
        run: npx playwright test tests/responsive-mobile.spec.js --project=chromium-desktop

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-authenticated
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7
