name: Full-stack authenticated E2E

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: full-stack-authenticated-${{ github.ref }}
  cancel-in-progress: true

jobs:
  authenticated-flow:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: madsuite_e2e_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d madsuite_e2e_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      CI: "true"
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/madsuite_e2e_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/madsuite_e2e_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      DB_NAME: madsuite_e2e_test
      TEST_DB_NAME: madsuite_e2e_test
      JWT_SECRET: CI-MADSuite_2026!JwtSecret#FullStack
      REFRESH_TOKEN_SECRET: CI-MADSuite_2026!RefreshSecret#FullStack
      STRIPE_SECRET_KEY: sk_test_ci_madsuite_financial_p0
      STRIPE_WEBHOOK_SECRET: whsec_ci_madsuite_financial_p0
      FRONTEND_URL: http://127.0.0.1:3000
      VITE_API_URL: http://127.0.0.1:5000
      TEST_API_URL: http://127.0.0.1:5000/api
      TEST_BASE_URL: http://127.0.0.1:3000
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
      E2E_BASE_URL: http://127.0.0.1:3000
      E2E_EXTERNAL_SERVERS: "1"
      SKIP_MIGRATIONS: "1"
      PORT: "5000"

    steps:
      - name: Checkout E2E
        uses: actions/checkout@v4
        with:
          path: e2e

      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: maddevopss/madsuite-backend
          path: backend

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: maddevopss/madsuite-frontend
          path: frontend

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            e2e/package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Installer les dépendances
        run: |
          # Le backend possède actuellement un conflit de peerDependencies ESLint
          # (eslint-config-standard 17 attend eslint-plugin-n 15/16). Le drapeau
          # reste limité à ce dépôt jusqu'à correction de son graphe de dépendances.
          npm ci --legacy-peer-deps --prefix backend
          npm ci --prefix frontend
          npm ci --prefix e2e
          npx --prefix e2e playwright install --with-deps chromium

      - name: Migrer la base de données
        working-directory: backend
        env:
          SKIP_MIGRATIONS: "0"
        run: npm run db:migrate

      - name: Démarrer le backend HTTP E2E
        working-directory: backend
        run: |
          nohup node -e "const app=require('./src/app'); const port=Number(process.env.PORT||5000); const server=app.listen(port,'0.0.0.0',()=>console.log('Backend HTTP E2E prêt sur '+port)); server.on('error',(error)=>{console.error(error); process.exit(1);});" > ../backend.log 2>&1 &
          echo $! > ../backend.pid

      - name: Attendre le backend
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:5000/health >/dev/null || curl --fail --silent http://127.0.0.1:5000/api/health >/dev/null || curl --fail --silent http://127.0.0.1:5000/api/system/health >/dev/null; then
              exit 0
            fi
            if ! kill -0 "$(cat backend.pid)" 2>/dev/null; then
              cat backend.log
              exit 1
            fi
            if (( attempt % 10 == 0 )); then
              echo "Backend toujours en attente (tentative ${attempt}/60)"
              cat backend.log || true
            fi
            sleep 2
          done
          cat backend.log
          echo "Le backend n'est pas devenu prêt."
          exit 1

      - name: Démarrer le frontend
        working-directory: frontend
        run: |
          nohup npm run dev -- --host 127.0.0.1 > ../frontend.log 2>&1 &
          echo $! > ../frontend.pid

      - name: Attendre le frontend
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:3000 >/dev/null; then
              exit 0
            fi
            if ! kill -0 "$(cat frontend.pid)" 2>/dev/null; then
              cat frontend.log
              exit 1
            fi
            sleep 2
          done
          cat frontend.log
          echo "Le frontend n'est pas devenu prêt."
          exit 1

      - name: Exécuter le parcours critique authentifié
        working-directory: e2e
        run: npx playwright test tests/critical-flow.spec.js --project=chromium-desktop --workers=1 --reporter=html,list

      - name: Exécuter le cycle financier P0
        working-directory: e2e
        run: npx playwright test tests/financial-cycle-p0.spec.js --project=chromium-desktop --workers=1 --reporter=html,list

      - name: Publier les preuves Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-stack-authenticated-evidence-${{ github.run_id }}
          path: |
            e2e/playwright-report/
            e2e/test-results/
            backend.log
            frontend.log
          if-no-files-found: warn
          retention-days: 14
